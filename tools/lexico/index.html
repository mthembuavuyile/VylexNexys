<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Lexico | Vylex Nexys Language Intelligence</title>
    <meta name="description" content="Lexico by Vylex Nexys offers intelligent language tools including definitions, synonyms, pronunciation, etymology, and text-to-speech for smarter learning." />
    
    <link rel="icon" href="https://vylexnexys.co.za/favicon.ico" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <h1><i class="fas fa-language"></i> Lexico</h1>
            </div>
            <nav id="nav">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/edTech/"><i class="fas fa-graduation-cap"></i> Learn</a>
                <a href="../text-analysis/"><i class="fas fa-chart-bar"></i> Analytics</a>
            </nav>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="nav-container">
            <div class="tab-buttons">
                <button class="tab-button active" data-tab="dictionary">
                    <i class="fas fa-book"></i> Dictionary
                </button>
                <button class="tab-button" data-tab="tts">
                    <i class="fas fa-volume-up"></i> Text-to-Speech
                </button>
            </div>
            <div class="controls">
                <button id="theme-toggle" class="btn">
                    <i class="fas fa-sun"></i> Light
                </button>
                <button class="btn" id="history-btn">
                    <i class="fas fa-history"></i> History
                </button>
            </div>
        </nav>

        <div id="visualizer" class="visualizer hidden"></div>

        <div id="dictionary-content" class="content-section">
            <div class="search-section">
                <div class="search-container">
                    <div class="search-wrapper">
                        <input type="text" id="wordInput" placeholder="Enter a word..." class="search-input" />
                        <button id="clearSearchBtn" class="clear-btn hidden" title="Clear">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <button id="searchBtn" class="btn primary">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i> Analyzing word...
            </div>
            <div id="error" class="error hidden"></div>

            <div id="resultsContainer" class="results-container hidden">
                <div id="wordHeader" class="word-header glass-card"></div>
                
                <div class="sections-grid">
                    <div class="section glass-card">
                        <h3><i class="fas fa-quote-left"></i> Definitions & Examples</h3>
                        <ul id="definitionList" class="definition-list"></ul>
                    </div>
                    
                    <div class="side-sections">
                        <div class="section glass-card mb-4">
                            <h3><i class="fas fa-link"></i> Synonyms</h3>
                            <ul id="synonymList" class="interactive-list"></ul>
                        </div>
                        <div class="section glass-card">
                            <h3><i class="fas fa-music"></i> Rhymes</h3>
                            <ul id="rhymeList" class="interactive-list"></ul>
                        </div>
                    </div>
                </div>
                
                <div class="section glass-card mt-6">
                    <h3><i class="fas fa-feather-alt"></i> Etymology</h3>
                    <div id="etymologyContent" class="etymology-content"></div>
                </div>
            </div>
        </div>

        <div id="tts-content" class="content-section hidden">
            <h2 class="section-title"><i class="fas fa-volume-up"></i> Synthesizer</h2>
            
            <textarea id="ttsText" placeholder="Enter text to speak..." class="tts-textarea"></textarea>

            <div class="tts-controls">
                <div class="control-group">
                    <label for="voiceSelect"><i class="fas fa-user"></i> Voice</label>
                    <select id="voiceSelect" class="select"><option value="">Loading voices...</option></select>
                </div>
                <div class="control-group">
                    <label for="speechRate"><i class="fas fa-tachometer-alt"></i> Speed: <span id="rateValue">1.0</span></label>
                    <input type="range" id="speechRate" class="slider" min="0.5" max="2" step="0.1" value="1">
                </div>
                <div class="control-group">
                    <label for="speechPitch"><i class="fas fa-wave-square"></i> Pitch: <span id="pitchValue">1.0</span></label>
                    <input type="range" id="speechPitch" class="slider" min="0.5" max="2" step="0.1" value="1">
                </div>
                <div class="control-group">
                    <label><i class="fas fa-magic"></i> Auto-Speak</label>
                    <button id="autoSpeakToggle" class="btn outline w-full">Auto-Speak: OFF</button>
                </div>
            </div>

            <div class="tts-buttons">
                <button id="ttsSpeakBtn" class="btn primary"><i class="fas fa-play"></i> Speak</button>
                <button id="ttsClearBtn" class="btn danger"><i class="fas fa-eraser"></i> Clear</button>
            </div>

            <div id="ttsHistorySection" class="section glass-card mt-6 hidden">
                <h3><i class="fas fa-history"></i> Recent Speech</h3>
                <ul id="ttsHistoryList" class="interactive-list history-list"></ul>
            </div>
        </div>
    </main>

    <div id="historyModal" class="modal hidden">
        <div class="modal-content glass-card">
            <button class="close-modal"><i class="fas fa-times"></i></button>
            <h3 class="modal-title"><i class="fas fa-history"></i> Search History</h3>
            <ul id="modalHistoryList" class="modal-history-list"></ul>
            <button id="clearHistoryBtn" class="btn danger w-full mt-4"><i class="fas fa-trash"></i> Clear History</button>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2024 <a href="https://vylexnexys.co.za">Vylex Nexys</a>. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
